name: Standalone MTC Updates to Discord

on:
  push:
    paths:
      - "Source/bin/MTC/osx-arm64/MTC"
      - "Source/bin/MTC/osx-x64/MTC"
      - "Source/bin/MTC/win-x64/MTC.exe"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mtc-binaries-to-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Build Discord payload
        env:
          EVENT_PATH: ${{ github.event_path }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import json
          import os

          watched = {
              "Source/bin/MTC/osx-arm64/MTC": "macOS Apple Silicon",
              "Source/bin/MTC/osx-x64/MTC": "macOS Intel",
              "Source/bin/MTC/win-x64/MTC.exe": "Windows x64",
          }

          with open(os.environ["EVENT_PATH"], "r", encoding="utf-8") as handle:
              event = json.load(handle)

          changed = []
          for commit in event.get("commits", []):
              for key in ("added", "modified", "removed"):
                  for path in commit.get(key, []):
                      if path in watched and path not in changed:
                          changed.append(path)

          if not changed:
              changed = list(watched.keys())

          repo = os.environ["REPOSITORY"]
          sha = os.environ["SHA"]
          short_sha = sha[:7]
          branch = os.environ["REF_NAME"]
          head_commit = event.get("head_commit") or {}
          actor = (
              event.get("pusher", {}).get("name")
              or event.get("sender", {}).get("login")
              or "unknown"
          )
          compare_url = event.get("compare") or f"https://github.com/{repo}/commit/{sha}"
          commit_url = f"https://github.com/{repo}/commit/{sha}"
          summary = (head_commit.get("message") or "Standalone MTC binaries updated").strip().splitlines()[0]

          download_lines = []
          for path in changed:
              label = watched.get(path, path)
              url = f"https://github.com/{repo}/raw/{sha}/{path}"
              download_lines.append(f"- **{label}**: [Download]({url})")

          payload = {
              "username": "Github Update",
              "avatar_url": "https://cdn.discordapp.com/avatars/487431320314576937/bd64361e4ba6313d561d54e78c9e7171.png",
              "content": "||@everyone||",
              "embeds": [
                  {
                      "title": "Standalone MTC binaries updated",
                      "description": (
                          f"**Branch:** `{branch}`\n"
                          f"**Commit:** [`{short_sha}`]({commit_url})\n"
                          f"**Author:** `{actor}`\n"
                          f"**Summary:** {summary}\n\n"
                          f"**Downloads:**\n" + "\n".join(download_lines) + "\n\n"
                          f"[View changes]({compare_url})"
                      ),
                      "color": 2105893,
                      "footer": { "text": "Changelog" },
                  }
              ],
          }

          with open("discord-payload.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle)
          PY

      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL || secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python <<'PY'
          import os
          import sys
          import urllib.request
          import urllib.error

          webhook_url = (os.environ.get("WEBHOOK_URL") or "").strip().strip("\"'")
          if not webhook_url:
              print("Missing WEBHOOK_URL / DISCORD_WEBHOOK_URL secret.", file=sys.stderr)
              sys.exit(1)

          if webhook_url.endswith("/github"):
              webhook_url = webhook_url[:-7]

          with open("discord-payload.json", "rb") as handle:
              payload = handle.read()

          request = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  status = getattr(response, "status", response.getcode())
                  if status >= 300:
                      print(f"Discord webhook returned HTTP {status}", file=sys.stderr)
                      sys.exit(1)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", "replace")
              print(f"Discord webhook returned HTTP {exc.code}: {body}", file=sys.stderr)
              raise
          PY
