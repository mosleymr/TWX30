name: Standalone MTC Updates to Discord

on:
  push:
    paths:
      - "Source/bin/MTC/osx-arm64/MTC"
      - "Source/bin/MTC/osx-x64/MTC"
      - "Source/bin/MTC/win-x64/MTC.exe"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-releases-to-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Discord payload
        env:
          EVENT_PATH: ${{ github.event_path }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import json
          import os

          watched = [
              "Source/bin/MTC/osx-arm64/MTC",
              "Source/bin/MTC/osx-x64/MTC",
              "Source/bin/MTC/win-x64/MTC.exe",
          ]

          with open(os.environ["EVENT_PATH"], "r", encoding="utf-8") as handle:
              event = json.load(handle)

          changed = []
          for commit in event.get("commits", []):
              for key in ("added", "modified", "removed"):
                  for path in commit.get(key, []):
                      if path in watched and path not in changed:
                          changed.append(path)

          head_commit = event.get("head_commit") or {}
          repo = os.environ["REPOSITORY"]
          sha = os.environ["SHA"]
          short_sha = sha[:7]
          branch = os.environ["REF_NAME"]
          actor = (
              event.get("pusher", {}).get("name")
              or event.get("sender", {}).get("login")
              or "unknown"
          )
          compare_url = event.get("compare") or f"https://github.com/{repo}/commit/{sha}"
          commit_url = f"https://github.com/{repo}/commit/{sha}"
          commit_message = (head_commit.get("message") or "Standalone MTC binaries updated").strip().splitlines()[0]

          if not changed:
              changed = watched

          changed_lines = "\n".join(
              f"- [`{path}`](https://github.com/{repo}/blob/{sha}/{path})"
              for path in changed
          )

          payload = {
              "username": "Github Update",
              "avatar_url": "https://cdn.discordapp.com/avatars/487431320314576937/bd64361e4ba6313d561d54e78c9e7171.png",
              "content": "||@everyone||",
              "embeds": [
                  {
                      "title": "Standalone MTC binaries updated",
                      "description": (
                          f"**Branch:** `{branch}`\n"
                          f"**Commit:** [`{short_sha}`]({commit_url})\n"
                          f"**Author:** `{actor}`\n"
                          f"**Summary:** {commit_message}\n\n"
                          f"**Changed binaries:**\n{changed_lines}\n\n"
                          f"[View changes]({compare_url})"
                      ),
                      "color": 2105893,
                      "footer": {
                          "text": "Changelog"
                      },
                  }
              ],
          }

          with open("discord-payload.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle)
          PY

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_PATH: ${{ github.event_path }}
          SHA: ${{ github.sha }}
        run: |
          python <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error

          raw_webhook_url = (os.environ.get("DISCORD_WEBHOOK_URL") or "").strip().strip("\"'")
          if not raw_webhook_url:
              print("DISCORD_WEBHOOK_URL secret is not set.", file=sys.stderr)
              sys.exit(1)

          webhook_url = raw_webhook_url.rstrip()
          is_github_endpoint = webhook_url.rstrip("/").endswith("/github")

          if is_github_endpoint:
              with open(os.environ["EVENT_PATH"], "rb") as handle:
                  payload = handle.read()
              headers = {
                  "Content-Type": "application/json",
                  "User-Agent": "GitHub-Hookshot/1.0",
                  "X-GitHub-Event": "push",
                  "X-GitHub-Delivery": os.environ["SHA"],
              }
          else:
              with open("discord-payload.json", "rb") as handle:
                  payload = handle.read()
              headers = {"Content-Type": "application/json"}

          request = urllib.request.Request(webhook_url, data=payload, headers=headers, method="POST")

          try:
              with urllib.request.urlopen(request) as response:
                  status = getattr(response, "status", response.getcode())
                  if status >= 300:
                      print(f"Discord webhook returned HTTP {status}", file=sys.stderr)
                      sys.exit(1)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", "replace")
              print(f"Discord webhook returned HTTP {exc.code}: {body}", file=sys.stderr)
              raise
          PY
